<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="FeedForward — Hyperlocal smart food redistribution. Donate surplus food, volunteer to deliver, reduce waste in India." />
    <meta name="keywords" content="food donation, volunteer, food waste, India, NGO, Lucknow, redistribution" />
    <meta name="theme-color" content="#F97316" />

    <!-- Open Graph -->
    <meta property="og:title" content="FeedForward — From Wasted Food to Timely Impact" />
    <meta property="og:description" content="Hyperlocal smart food redistribution platform. Powered by community volunteers." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://feedforward.in" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FeedForward" />
    <meta name="twitter:description" content="Turn food waste into impact. Join India's food redistribution movement." />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <title>FeedForward — Food Redistribution Platform</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Register service worker
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js")
            .then(reg => console.log("[SW] Registered:", reg.scope))
            .catch(err => console.log("[SW] Registration failed:", err));
        });
      }
    </script>
  </body>
</html>
